<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpaceVR Admin -- Sign In</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}" />
</head>
<body class="admin-body">

<div class="login-shell">
  <div class="login-card">
    <div class="logo">SPACE<span>VR</span></div>
    <div class="subtitle">Admin Control Center</div>

    <!-- Handles form submit cleanly, forwarding the 'next' query param safely if present -->
    <form method="POST" action="{{ url_for('admin_login', next=request.args.get('next', '')) }}">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter admin username" required autofocus autocomplete="username" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter admin password" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn btn-primary btn-full">Sign In</button>
    </form>

    <!-- Flashed messages or direct error context from Flask -->
    {% if error %}
    <div class="login-error">{{ error }}</div>
    {% endif %}

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="login-error">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
  </div>
</div>

</body>
</html>
